<div id="root"></div>
<div id="err-display" style="display:none;position:fixed;inset:0;background:#1a0000;color:#ff6b6b;font-family:monospace;font-size:13px;padding:30px;z-index:99999;white-space:pre-wrap;overflow:auto;"></div>

<script>
window.onerror = function(msg, src, line, col, err) {
  var d = document.getElementById('err-display');
  d.style.display = 'block';
  d.textContent += (err ? err.stack : msg) + '\n\nFile: ' + src + ':' + line + '\n\n';
};
window.addEventListener('unhandledrejection', function(e) {
  var d = document.getElementById('err-display');
  d.style.display = 'block';
  d.textContent += 'Unhandled promise: ' + (e.reason && e.reason.stack ? e.reason.stack : e.reason) + '\n\n';
});
</script>

<!-- Force UTF-8 decoding for all XHR responses so Babel reads JSX files correctly -->
<script>
(function() {
  var orig = XMLHttpRequest.prototype.open;
  XMLHttpRequest.prototype.open = function() {
    orig.apply(this, arguments);
    try { this.overrideMimeType('text/plain; charset=utf-8'); } catch(e) {}
  };
})();
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<!-- Make React hooks available as globals so any Babel-eval scope can use them -->
<script>

    var hooks = ['useState','useEffect','useRef','useMemo','useCallback','useContext','useReducer','useLayoutEffect','useId'];
    hooks.forEach(function(h) { window[h] = React[h]; });
  })();
</script>
